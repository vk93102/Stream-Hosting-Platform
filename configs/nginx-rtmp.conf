# ============================================================
#  Nginx + nginx-rtmp-module Configuration
#  SIL IRL Hosting Platform  –  RTMP Ingest Server
#
#  Install:
#    Ubuntu: apt install nginx libnginx-mod-rtmp
#    macOS:  brew install nginx-full --with-rtmp-module
#            OR use the Docker image (see docker-compose.yml)
#
#  Place this file at /etc/nginx/nginx.conf
# ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

# ── HTTP block (dashboard proxy + RTMP API + HLS delivery) ──────────────────
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    gzip on;

    # ── Rate limit RTMP auth endpoint ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=rtmp_auth:10m rate=10r/s;

    # ── Upstream: SIL control plane ───────────────────────────────────────
    upstream sil_api {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # ── RTMP stat page (internal monitoring) ──────────────────────────
        location /rtmp-stat {
            rtmp_stat all;
            rtmp_stat_stylesheet /rtmp-stat.xsl;
            allow 127.0.0.1;
            deny all;
        }

        location /rtmp-stat.xsl {
            root /usr/share/nginx/html;
        }

        # ── RTMP control (kick streams) ───────────────────────────────────
        location /control {
            rtmp_control all;
            allow 127.0.0.1;
            deny all;
        }

        # ── HLS delivery (for viewers) ────────────────────────────────────
        location /hls {
            root /tmp/hls;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }

        # ── Proxy everything else to SIL Node.js ─────────────────────────
        location / {
            proxy_pass         http://sil_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }
    }
}

# ── RTMP block ───────────────────────────────────────────────────────────────
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_connections 1000;

        # ── Live application (IRL / OBS ingest) ───────────────────────────
        application live {
            live on;
            record off;

            # ── Auth callback → SIL control plane ─────────────────────────
            # nginx-rtmp calls this URL on_publish.
            # SIL validates the stream key and returns 200 (allow) or 403 (deny).
            on_publish http://127.0.0.1:3000/rtmp/auth;

            # Called when stream ends
            on_done    http://127.0.0.1:3000/rtmp/done;

            # ── HLS output (optional viewer playback) ─────────────────────
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 10s;
            hls_cleanup on;

            # ── Deny direct playback (viewers use HLS or SIL dashboard) ──
            allow publish all;
            deny  play   all;
        }

        # ── Re-stream relay application (used internally by FFmpeg) ───────
        # SIL's FFmpeg restreamer pushes to this app, which pushes to platforms.
        application relay {
            live on;
            record off;
            allow publish 127.0.0.1;
            deny  publish all;
            allow play    127.0.0.1;
            deny  play    all;
        }
    }
}
