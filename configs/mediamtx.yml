# ============================================================
#  MediaMTX Configuration  –  SIL IRL Hosting Platform
#  SRT + RTMP ingest with webhook auth
#
#  Install: https://github.com/bluenviron/mediamtx/releases
#  Run:     ./mediamtx mediamtx.yml
# ============================================================

# ── Global settings ───────────────────────────────────────────────────────────
logLevel: info
logDestinations: [stdout, file]
logFile: logs/mediamtx.log

readTimeout:  10s
writeTimeout: 10s
readBufferCount: 4096
udpMaxPayloadSize: 1472

# ── API (used by SIL control plane to list/kick streams) ──────────────────────
api: true
apiAddress: 127.0.0.1:9997

# ── Metrics (Prometheus) ──────────────────────────────────────────────────────
metrics: true
metricsAddress: 127.0.0.1:9998

# ── Auth (publish validation) ────────────────────────────────────────────────
# MediaMTX will call this endpoint before accepting a publish.
# SIL validates the stream key and starts the restream session.
authMethod: http
authHTTPAddress: http://127.0.0.1:3000/rtmp/auth

# ── RTMP server (secondary – nginx-rtmp is primary) ───────────────────────────
rtmp: true
rtmpAddress: :1936      # Use 1936 to avoid conflict with nginx-rtmp on 1935
rtmpEncryption: "no"

# ── SRT server  (PRIMARY IRL ingest) ─────────────────────────────────────────
srt: true
srtAddress: :9999       # IRL encoders connect here

# ── HLS (optional – browser preview) ─────────────────────────────────────────
hls: true
hlsAddress: :8888
hlsAlwaysRemux: false
hlsSegmentCount: 3
hlsSegmentDuration: 2s
hlsPartDuration: 200ms

# ── WebRTC (optional) ─────────────────────────────────────────────────────────
webrtc: false

pathDefaults:
  # Notify SIL when a stream disappears (used to trigger BRB / finalize sessions).
  runOnNotReady: >
    curl -s -X POST http://127.0.0.1:3000/rtmp/done
    -H "Content-Type: application/x-www-form-urlencoded"
    -d "name=$MTX_PATH"

# ── Path configurations ───────────────────────────────────────────────────────
paths:
  all_others:
    sourceOnDemand: false
